<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密カスタム・ストップゲーム Pro: Timeline Edition</title>
    <style>
        :root {
            --seg-on: #ff4757;
            --seg-off: #2d3436;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #333;
            color: white;
            margin: 0;
            padding: 20px;
        }

        #game-container {
            text-align: center;
            background: #222;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
            width: 460px;
        }

        #setup-panel {
            background: #111;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* タイムライン設定エリア */
        #timeline-settings {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .player-config {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #222;
            padding: 5px;
            border-radius: 4px;
        }

        input[type="number"], input[type="text"] {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 4px;
            border-radius: 4px;
            text-align: center;
        }

        input[type="color"] {
            border: none;
            width: 20px;
            height: 20px;
            cursor: pointer;
            background: none;
        }

        #visualizer-resizer {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            background: #111;
            border-radius: 50%;
        }

        #timeChart { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        #clock-image-bg {
            position: absolute; top: 15px; left: 15px; width: 190px; height: 190px;
            border-radius: 50%; z-index: 1; background-size: cover; background-position: center;
            background-color: #444; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #clock-face {
            position: absolute; top: 0; left: 0; width: 220px; height: 220px;
            z-index: 3; pointer-events: none;
        }

        #hand {
            width: 3px; height: 100px; background-color: #bbbb00; position: absolute;
            bottom: 50%; left: calc(50% - 1.5px); transform-origin: bottom center;
            transition: transform 0.05s linear; border-radius: 2px;
        }

        .center-pin {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: #000; border-radius: 50%; transform: translate(-50%, -50%);
        }

        .display-panel {
            display: flex; justify-content: center; align-items: flex-end; background: #000;
            padding: 15px; border-radius: 12px; margin-bottom: 15px; gap: 6px; border: 2px solid #444;
            min-height: 70px;
        }
        .digit { position: relative; width: 35px; height: 60px; transform: skewX(-5deg); }
        .segment { position: absolute; background: var(--seg-off); border-radius: 10px; transition: background 0.05s; }
        .seg-a { top: 0; left: 4px; right: 4px; height: 5px; }
        .seg-b { top: 4px; right: 0; bottom: 32px; width: 5px; }
        .seg-c { top: 33px; right: 0; bottom: 4px; width: 5px; }
        .seg-d { bottom: 0; left: 4px; right: 4px; height: 5px; }
        .seg-e { top: 33px; left: 0; bottom: 4px; width: 5px; }
        .seg-f { top: 4px; left: 0; bottom: 32px; width: 5px; }
        .seg-g { top: 28px; left: 4px; right: 4px; height: 5px; }
        .dot { width: 6px; height: 6px; background: var(--seg-on); border-radius: 50%; margin-bottom: 5px; }
        .on { background: var(--seg-on); box-shadow: 0 0 10px var(--seg-on); }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            color: white; border: none; border-radius: 12px; transition: 0.2s;
        }
        #action-btn { background-color: #0984e3; flex: 2; }
        #reset-btn { background-color: #d63031; }
        
        #records-list {
            text-align: left; font-size: 0.8rem; max-height: 120px; overflow-y: auto;
            border-top: 1px solid #444; padding-top: 10px; color: #aaa; margin-top: 15px;
        }
        .record-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #333; }
        .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-panel">
        <div class="setup-row">
            <label>人数:</label>
            <input type="number" id="input-players" value="4" min="1">
        </div>
        <div class="setup-row">
            <label>合計制限時間 (秒):</label>
            <input type="number" id="input-total-time" value="40" min="1">
        </div>
        <div id="timeline-settings"></div>
    </div>

    <div id="visualizer-resizer">
        <div id="clock-image-bg"></div>
        <canvas id="timeChart" width="220" height="220"></canvas>
        <div id="clock-face">
            <div id="hand"></div>
            <div class="center-pin"></div>
        </div>
    </div>

    <div class="display-panel" id="main-display"></div>

    <div style="margin-bottom:10px;">
        PLAYER: <span id="current-p-label">1</span> / <span id="target-players">4</span>
    </div>
    
    <div class="btn-group">
        <button id="action-btn">START MISSION</button>
        <button id="reset-btn">RESET</button>
    </div>
    
    <p id="message" style="height: 1.2em; margin: 10px 0; font-weight: bold;"></p>
    <div id="records-list"></div>
</div>

<script>
const CLOCK_IMAGE_URL = "Screenshot 2026-04-01 18.17.26.png"; 
    document.getElementById('clock-image-bg').style.backgroundImage = `url('${CLOCK_IMAGE_URL}')`;

        // --- 実行ロジック (実時間ベースに修正) ---
    let startTime = 0;
    let pausedTime = 0; // 一時停止用

    function startTimer() {
        if (isRunning) {
            // 一時停止処理
            clearInterval(timerId);
            isRunning = false;
            pausedTime += Date.now() - startTime; // これまで経過した実時間を蓄積
            startBtn.textContent = "RESUME";
            startBtn.classList.remove('running');
        } else {
            if (timeLeft <= 0) {
                initTimer();
                pausedTime = 0;
            }
            isRunning = true;
            startBtn.textContent = "PAUSE";
            startBtn.classList.add('running');
            msgEl.textContent = "";
            
            // 開始時刻を記録
            startTime = Date.now();

            timerId = setInterval(() => {
                // 「今この瞬間」と「開始した瞬間」の差分を計算
                const currentTime = Date.now();
                const elapsedTotal = (currentTime - startTime + pausedTime) / 1000;
                
                timeLeft = maxTime - elapsedTotal;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerId);
                    isRunning = false;
                    pausedTime = 0;
                    startBtn.textContent = "START";
                    startBtn.classList.remove('running');
                    msgEl.textContent = "FINISH";
                    msgEl.style.color = document.getElementById('color-ring').value;
                }
                drawVisuals();
            }, 16); // 16ms(約60fps)程度がスマホの描画負荷的にも最適です
        }
    }

    // リセットボタンも初期化
    document.getElementById('reset-btn').addEventListener('click', () => {
        clearInterval(timerId);
        isRunning = false;
        pausedTime = 0; // ここをリセット
        startBtn.textContent = "START";
        startBtn.classList.remove('running');
        msgEl.textContent = "";
        initTimer();
    });

</script>

</body>
</html>
